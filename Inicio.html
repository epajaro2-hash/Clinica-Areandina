<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desarrollo Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Clínica Areandina</h1>

    <div class="formulario">
        <h3>REGISTRO DE CITAS</h3>
        
        <label>ID Paciente:</label>
        <input type="text" id="id" placeholder="CC / TI">

        <label>Nombre del Paciente:</label>
        <input type="text" id="nombre" placeholder="Nombre completo">

        <label>Edad:</label>
        <input type="number" id="edad" placeholder="Años">

        <label>Especialista:</label>
        <select id="medico">
            <option value="Dr. Pájaro (Internista)">Dr. Pájaro (Internista)</option>
            <option value="Dra. Flores (Ginecóloga)">Dra. Flores (Ginecóloga)</option>
            <option value="Dr. Beltrán (Medicina General)">Dr. Beltrán (Medicina General)</option>
            <option value="Dra. De Avila (Cardióloga)">Dra. De Avila (Cardióloga)</option>
        </select>

        <button id="btnGuardar">Guardar y Agendar</button>
    </div>

    <div id="lista-pacientes" class="tabla-pacientes">
        </div>

    <script src="script.js"></script>
</body>
</html>
